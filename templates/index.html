<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Messaging Panel</title>

<meta name="csrf-token" content="{{ csrf_token() }}">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container {
    width:100%;
    max-width:820px;
    height:620px;
    display:flex;
    flex-direction:column;
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(20px);
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 30px 100px rgba(0,0,0,0.9);
    overflow:hidden;
}

.header {
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    color:#e2e8f0;
}

#status {
    font-size:12px;
    position:relative;
}

#status::before {
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    position:absolute;
    left:-14px;
    top:4px;
    background:currentColor;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0%{box-shadow:0 0 0 0 currentColor;}
    70%{box-shadow:0 0 0 8px transparent;}
    100%{box-shadow:0 0 0 0 transparent;}
}

#latency {
    font-size:11px;
    color:#94a3b8;
}

.messages {
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.messages::-webkit-scrollbar {
    width:6px;
}
.messages::-webkit-scrollbar-thumb {
    background:#334155;
}

.msg {
    margin-bottom:14px;
    display:flex;
    animation:fadeUp 0.3s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

.msg.user { justify-content:flex-end; }

.bubble {
    padding:12px 16px;
    border-radius:16px;
    max-width:65%;
    font-size:14px;
}

.user .bubble {
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
}

.system .bubble {
    background:rgba(255,255,255,0.05);
    color:#e2e8f0;
}

.time {
    font-size:10px;
    margin-top:6px;
    color:#94a3b8;
}

/* ===== LOG PANEL ===== */
#logsPanel {
    display:none;
    height:200px;
    overflow-y:auto;
    background:#020617;
    color:#22c55e;
    font-size:12px;
    padding:10px;
    border-top:1px solid rgba(255,255,255,0.1);
}

/* ===== FOOTER ===== */
.footer {
    padding:16px;
    border-top:1px solid rgba(255,255,255,0.05);
}

.input-group {
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}

button {
    padding:12px 20px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    cursor:pointer;
    position:relative;
}

button.loading {
    pointer-events:none;
    opacity:0.7;
}

button.loading::after {
    content:"";
    width:14px;
    height:14px;
    border:2px solid white;
    border-top:2px solid transparent;
    border-radius:50%;
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    animation:spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform:translateY(-50%) rotate(360deg); }
}

.typing span {
    display:inline-block;
    width:6px;
    height:6px;
    margin:0 2px;
    background:#94a3b8;
    border-radius:50%;
    animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink {
    0%,80%,100%{opacity:0.2;}
    40%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            DevOps Messaging Panel
            <button id="logsBtn" style="margin-left:10px; padding:6px 10px; font-size:12px;">
                Logs
            </button>
        </div>

        <div style="text-align:right;">
            <div id="status"
                 style="color: {{ 'red' if db_status == 'down' else '#22c55e' }}">
                ● {{ db_status }}
            </div>
            <div id="latency">Latency: -- ms</div>

            <!-- 🔥 METRICS -->
            <div style="font-size:11px; color:#94a3b8;">
                <div id="hits">Hits: {{ hits }}</div>
                <div id="clicks">Clicks: {{ clicks }}</div>
            </div>
        </div>
    </div>

    <div class="messages" id="messages">

        {% for message in messages %}
        <div class="msg system">
            <div class="bubble">
                {{ message.message }}
                <div class="time">
                    {{ message.created_at.strftime('%H:%M') }}
                </div>
            </div>
        </div>
        {% endfor %}

    </div>

    <div id="logsPanel"></div>

    <div class="footer">
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Type message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

function scrollBottom() {
    let box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
}

function escapeHTML(text) {
    return $("<div>").text(text).html();
}

function addMessage(text, type, time) {
    $("#messages").append(`
        <div class="msg ${type}">
            <div class="bubble">
                ${escapeHTML(text)}
                <div class="time">${time}</div>
            </div>
        </div>
    `);
    scrollBottom();
}

/* TYPING */
function showTyping() {
    $("#messages").append(`
        <div class="msg system" id="typing">
            <div class="bubble typing">
                <span></span><span></span><span></span>
            </div>
        </div>
    `);
}

function removeTyping() {
    $("#typing").remove();
}

/* SEND */
$("#sendBtn").click(sendMsg);

function sendMsg() {
    let input = $("#msgInput");
    let btn = $("#sendBtn");
    let msg = input.val().trim();

    if (!msg) return;

    // 🔥 TRACK CLICK
    fetch('/track_click', { method: 'POST' });

    addMessage(msg, "user", "now");
    input.val("");

    btn.addClass("loading");
    showTyping();

    let start = performance.now();

    $.ajax({
        url: "/submit",
        type: "POST",
        data: { new_message: msg },
        headers: {
            "X-CSRFToken": $("meta[name='csrf-token']").attr("content")
        },
        success: function(res) {
            let latency = Math.round(performance.now() - start);
            $("#latency").text("Latency: " + latency + " ms");

            removeTyping();

            if (res.status === "success") {
                addMessage(res.message, "system", res.time);
            } else {
                addMessage(res.message, "system", "error");
            }

            loadMetrics();
        },
        error: function() {
            removeTyping();
            $("#status").text("● down").css("color","red");
            addMessage("Server error", "system", "error");
        },
        complete: function() {
            btn.removeClass("loading");
        }
    });
}

/* METRICS AUTO REFRESH */
function loadMetrics() {
    fetch('/metrics')
    .then(res => res.json())
    .then(data => {
        $("#hits").text("Hits: " + data.hits);
        $("#clicks").text("Clicks: " + data.clicks);
    });
}

setInterval(loadMetrics, 5000);

/* LOG VIEWER */
$("#logsBtn").click(function() {
    let panel = $("#logsPanel");

    if (panel.is(":visible")) {
        panel.hide();
        return;
    }

    fetch('/logs')
    .then(res => res.json())
    .then(data => {
        panel.show();
        panel.html(data.logs.map(l => `<div>${l}</div>`).join(""));
        panel.scrollTop(panel[0].scrollHeight);
    })
    .catch(() => {
        panel.show().html("Error loading logs");
    });
});

$("#msgInput").keypress(function(e){
    if(e.which === 13) sendMsg();
});

setInterval(() => {
    fetch('/health')
    .then(res => res.json())
    .then(data => {
        $("#status").text("● " + data.status)
            .css("color", data.status === "healthy" ? "#22c55e" : "red");
    })
    .catch(() => {
        $("#status").text("● down").css("color","red");
    });
}, 5000);

scrollBottom();

</script>

</body>
</html>
